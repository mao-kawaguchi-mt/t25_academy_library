<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common :: meta_header('書籍一覧',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/index.css}" />
    <script type="text/javascript" th:src="@{/js/book/index.js}"></script>
</head>
<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍一覧
                <a th:href="@{/book/add}" class="link" 
                    style="font-size: 15pt; float: right; background-color: #66cdaa;
                    color: black; padding: 10px 30px; text-decoration: none; border-radius: 5px;">＋書籍登録</a>
                </div>
                <div>
                    <table style="border: 1px solid #ccc; padding: 8px; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 1px solid #ccc;">
                                <th style="font-size: 15pt; background-color: #f0f0f0; border-bottom: 1px solid #ccc;">書籍名</th>
                                <th style="font-size: 15pt; background-color: #f0f0f0; border-bottom: 1px solid #ccc;">ISBN</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="book : ${bookMstList}">
                                <td th:text="${book.title}"></td>
                                <td th:text="${book.isbn}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
</body>
